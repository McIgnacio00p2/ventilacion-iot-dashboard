<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistema IoT de Ventilación Inteligente">
    <meta name="theme-color" content="#0f172a">
    
    <title>Ventilación IoT | Control Inteligente</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌬️</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/mqtt@5.3.0/dist/mqtt.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navegación Superior -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <span class="brand-icon">🌬️</span>
                <span class="brand-text">Ventilación IoT</span>
            </div>
            <div class="nav-status">
                <div class="connection-indicator" id="connectionIndicator">
                    <span class="dot"></span>
                    <span class="label">Conectado</span>
                </div>
                <div class="time" id="currentTime">00:00</div>
            </div>
        </div>
    </nav>

    <!-- Contenido Principal -->
    <main class="main-content">
        <div class="dashboard-container">
            
            <!-- Sección Superior: Estado y Control -->
            <div class="top-section">
                
                <!-- Tarjeta Principal: Ventilador -->
                <div class="card ventilador-card">
                    <div class="ventilador-display">
                        <div class="fan-icon" id="fanIcon">🌀</div>
                        <div class="ventilador-status">
                            <h2 id="ventiladorLabel">APAGADO</h2>
                            <span class="mode-badge" id="modeBadge">Modo Auto</span>
                        </div>
                    </div>
                    
                    <!-- Botones de Control -->
                    <div class="control-group">
                        <button class="ctrl-btn power-btn" id="btnOn" onclick="controlManual('ON')">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42C17.99 7.86 19 9.81 19 12c0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.19 1.01-4.14 2.59-5.42L6.17 5.17C4.23 6.82 3 9.26 3 12c0 4.97 4.03 9 9 9s9-4.03 9-9c0-2.74-1.23-5.18-3.17-6.83z"/>
                            </svg>
                            Encender
                        </button>
                        <button class="ctrl-btn stop-btn" id="btnOff" onclick="controlManual('OFF')">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M6 6h12v12H6z"/>
                            </svg>
                            Apagar
                        </button>
                    </div>
                </div>

                <!-- Tarjeta Secundaria: Sensor -->
                <div class="card sensor-card">
                    <div class="sensor-header">
                        <h3>Sensor de Presencia</h3>
                    </div>
                    <div class="sensor-display">
                        <div class="sensor-radar" id="sensorRadar">
                            <div class="radar-ring"></div>
                            <div class="radar-ring"></div>
                            <div class="radar-ring"></div>
                            <div class="radar-dot"></div>
                        </div>
                        <div class="sensor-info">
                            <span id="sensorStatus">Sin presencia</span>
                            <span class="last-detection" id="lastDetection">Última: --</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Sección Inferior: Gráfico Compacto -->
            <div class="bottom-section">
                <div class="card chart-card">
                    <div class="chart-header">
                        <h3>Actividad Reciente</h3>
                        <div class="chart-legend">
                            <span class="legend-item"><span class="legend-color vent-color"></span> Ventilador</span>
                            <span class="legend-item"><span class="legend-color pir-color"></span> Sensor</span>
                        </div>
                    </div>
                    <div class="chart-body">
                        <canvas id="activityChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
        <iframe width="450" height="260" style="border: 1px solid #cccccc;" src="https://thingspeak.com/channels/3397586/charts/1?bgcolor=%23ffffff&color=%23d62020&dynamic=true&results=60&type=line&update=15"></iframe>
    </main>

    <!-- Toast de Notificación -->
    <div class="toast" id="toast"></div>

    <script src="js/mqtt-client.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
